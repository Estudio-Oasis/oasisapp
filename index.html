        <h1>Bitácora — Registro de actividad para creativos y equipos</h1>
        <p>Le ponemos proceso y orden a la creatividad. Registra tu trabajo, entiende cómo se va tu día y empieza a poner orden a tu operación.</p>
        <h2>¿Para quién es Bitácora?</h2>
        <ul>
          <li><strong>Freelancers</strong> — Registra tu día y entiende a dónde se va tu tiempo.</li>
          <li><strong>Equipos creativos</strong> — Visibilidad del equipo sin interrumpir el flujo.</li>
          <li><strong>Líderes y admins</strong> — Toma decisiones con datos reales de operación.</li>
          <li><strong>Agencias y despachos</strong> — Conecta trabajo, clientes y cobranza.</li>
          <li><strong>Consultores</strong> — Registra horas por proyecto para cobrar mejor.</li>
          <li><strong>Founders</strong> — Pon orden a la operación desde el día uno.</li>
        </ul>
        <h2>Funciones principales</h2>
        <ul>
          <li>Registro con un clic o manual</li>
          <li>Cada entrada se conecta a cliente, proyecto y tarea</li>
          <li>Timeline visual de tu día</li>
          <li>Funciona para individuos y equipos</li>
        </ul>
        <h2>Planes y precios</h2>
        <ul>
          <li><strong>Bitácora Personal</strong> — Gratis. Registro ilimitado, historial de 14 días.</li>
          <li><strong>Equipo 3</strong> — $9/mes. Hasta 3 miembros, historial completo.</li>
          <li><strong>Equipo 6</strong> — $16/mes. Hasta 6 miembros, soporte prioritario.</li>
          <li><strong>Equipo 10</strong> — $20/mes. Hasta 10 miembros, onboarding personalizado.</li>
        </ul>
        <h2>Cómo funciona</h2>
        <ol>
          <li>Crea tu cuenta gratis — en menos de un minuto.</li>
          <li>Registra tu primera actividad — con timer o manualmente.</li>
          <li>Tu día toma forma — ve el timeline de tu jornada.</li>
          <li>Escala cuando lo necesites — invita a tu equipo.</li>
        </ol>
